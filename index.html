<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cianc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="bg"></div>

  <div class="landing">

    <!-- Logo -->
    <div class="brand">
      <div class="brand-icon">C</div>
      <span class="brand-name">Cianc</span>
    </div>

    <!-- Hero Text -->
    <h1 class="landing-title">Your Creative Space</h1>
    <p class="landing-sub">Share moments, discover stories, and connect with the people that matter most to you.</p>

    <!-- Buttons -->
    <div class="landing-btns">
      <a href="signup.html" class="btn-grad">Get Started</a>
      <a href="login.html" class="btn-ghost">Sign In</a>
    </div>

    <!-- Decorative tiles preview -->
    <div class="preview-grid">
      <div class="pt t1"></div>
      <div class="pt t2"></div>
      <div class="pt t3"></div>
      <div class="pt t4"></div>
      <div class="pt t5"></div>
      <div class="pt t6"></div>
    </div>

  </div>

</body>
</html>
