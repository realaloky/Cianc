<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cianc — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-body">

  <!-- Navbar -->
  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-icon">C</div>
      <span class="nav-title">Cianc</span>
    </div>
    <div class="nav-right">
      <span class="nav-username" id="nav-username">User</span>
      <div class="nav-av" id="nav-av">U</div>
      <a href="index.html" class="nav-logout">Logout</a>
    </div>
  </nav>

  <!-- Page content -->
  <div class="home-inner">

    <!-- Hero -->
    <div class="hero">
      <div class="hero-greet">Welcome back, <strong id="uname">Friend</strong></div>
      <h1>Your Creative Space</h1>
      <p>Share moments, discover stories, and connect with the people that matter most.</p>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-n">248</div>
        <div class="stat-l">POSTS</div>
      </div>
      <div class="stat">
        <div class="stat-n">4.2K</div>
        <div class="stat-l">FOLLOWERS</div>
      </div>
      <div class="stat">
        <div class="stat-n">531</div>
        <div class="stat-l">FOLLOWING</div>
      </div>
    </div>

    <!-- Explore grid -->
    <div class="sec-title">Explore</div>
    <div class="grid">
      <div class="tile t1"><span class="tile-lbl">Trending</span></div>
      <div class="tile t2"><span class="tile-lbl">Travel</span></div>
      <div class="tile t3"><span class="tile-lbl">Nature</span></div>
      <div class="tile t4"><span class="tile-lbl">Design</span></div>
      <div class="tile t5"><span class="tile-lbl">Art</span></div>
      <div class="tile t6"><span class="tile-lbl">Lifestyle</span></div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
