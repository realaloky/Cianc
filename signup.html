<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cianc — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="bg"></div>

  <div class="auth-wrap">
    <div class="split-card">

      <!-- Left gradient panel -->
      <div class="panel">
        <div class="panel-brand">
          <div class="panel-icon">C</div>
          <span class="panel-name">Cianc</span>
        </div>
        <div class="panel-body">
          <h2>Welcome Back!</h2>
          <p>Already have an account? Sign in to continue your journey with Cianc.</p>
          <a href="login.html" class="btn-outline">SIGN IN</a>
        </div>
      </div>

      <!-- Right form -->
      <div class="form-panel">
        <h1>Create Account</h1>
        <p class="sub">Join Cianc — it only takes a moment</p>

        <div class="socials">
          <button class="soc-btn">f</button>
          <button class="soc-btn">G+</button>
          <button class="soc-btn">in</button>
        </div>

        <div class="divider">or use your email</div>

        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="su-name" placeholder="Full Name">
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input type="email" id="su-email" placeholder="Email Address">
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="su-pass" placeholder="Password">
        </div>

        <p class="errmsg" id="su-err"></p>

        <button class="btn-primary" id="su-btn" onclick="doSignup()">
          <span class="lbl">SIGN UP</span>
          <div class="spin"></div>
        </button>

        <div class="link-row">Already have an account? <a href="login.html">Sign In</a></div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
